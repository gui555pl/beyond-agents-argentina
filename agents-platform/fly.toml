# fly.toml — Beyond Agents backend (Express + SSE + SQLite)
#
# Deploy:
#   1) fly auth login
#   2) cd agents-platform
#   3) fly apps create beyond-agents-api  (ou ajustar `app` abaixo)
#   4) fly volumes create data --size 1 --region gru
#   5) fly secrets set ANTHROPIC_API_KEY=... ALLOWED_ORIGINS=https://<vercel>.vercel.app
#   6) fly deploy

app = "beyond-agents-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4001"
  NODE_ENV = "production"
  DATABASE_PATH = "/data/runs.sqlite"
  MAX_CONCURRENT_RUNS = "3"

# Volume persistente para SQLite (criado com `fly volumes create data --size 1`).
[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 4001
  force_https = true
  # SSE precisa de conexão sempre acesa — desligamos auto_stop/start
  # para evitar cold-starts no meio de uma run de 1-3 min.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    # Generoso pra suportar SSE longas + outros endpoints simultâneos.
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  # shared-cpu-1x com 512MB cobre folgado a demo (3 runs simultâneas + SQLite).
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
